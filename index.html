<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <script src="agent.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a1a2e;
      --accent: #e94560;
      --bg: #f8f6f2;
      --surface: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b6b6b;
      --border: rgba(26, 26, 46, 0.1);
      --user-bubble: #1a1a2e;
      --user-text: #ffffff;
      --bot-bubble: #ffffff;
      --bot-text: #1a1a2e;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Layout ── */
    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      height: 92vh;
      max-height: 720px;
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(26, 26, 46, 0.12);
    }

    /* ── Header ── */
    .chat-header {
      background: var(--primary);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 18px;
      color: white;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-name {
      font-family: var(--font-display);
      font-size: 17px;
      color: white;
      font-weight: 500;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
    }

    .status-text {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
    }

    /* ── Quick suggestions ── */
    .suggestions {
      padding: 14px 16px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .suggestion-chip {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-body);
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(233, 69, 96, 0.04);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .bot .msg-avatar { background: var(--primary); color: white; }
    .user .msg-avatar { background: var(--accent); color: white; }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 300;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border-radius: 4px 18px 18px 18px;
      border: 1px solid var(--border);
    }

    .user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-radius: 18px 4px 18px 18px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 13px 16px;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.2); }
    }

    /* ── Input ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--surface);
    }

    .input-field {
      flex: 1;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }

    .send-btn:hover { transform: scale(1.06); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── Branding footer ── */
    .powered-by {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 0 10px;
      font-weight: 300;
      flex-shrink: 0;
    }

    .powered-by span { color: var(--accent); }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar" id="header-avatar">A</div>
    <div class="header-info">
      <div class="header-name" id="header-name">Assistant</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <div class="status-text">Disponible maintenant</div>
      </div>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion('Quels sont vos horaires ?')">Horaires</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Pouvez-vous me montrer le menu ?')">Menu</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Comment réserver une table ?')">Réserver</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Comment vous accéder ?')">Accès</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="input"
      class="input-field"
      placeholder="Posez votre question..."
      rows="1"
    ></textarea>
    <button id="send-btn" class="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered-by">Propulsé par <span>IA</span> · Votre assistant 24/7</div>
</div>

<script>
  // ── Init depuis config ────────────────────────────────
  document.getElementById("header-avatar").textContent = AGENT_CONFIG.agentName.charAt(0);
  document.getElementById("header-name").textContent = AGENT_CONFIG.agentName + " · " + AGENT_CONFIG.restaurantName;
  document.documentElement.style.setProperty("--primary", AGENT_CONFIG.primaryColor);
  document.documentElement.style.setProperty("--accent", AGENT_CONFIG.accentColor);
  document.title = "Assistant — " + AGENT_CONFIG.restaurantName;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  // ── Ajoute un message dans le chat ───────────────────
  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = "message " + role;

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "bot" ? AGENT_CONFIG.agentName.charAt(0) : "V";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Indicateur "en train d'écrire" ───────────────────
  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message bot";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = AGENT_CONFIG.agentName.charAt(0);

    const bubble = document.createElement("div");
    bubble.className = "bubble typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  // ── Envoie un message ─────────────────────────────────
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    inputEl.disabled = true;

    // Cache les suggestions après le 1er message
    document.getElementById("suggestions").style.display = "none";

    addMessage("user", text);
    showTyping();

    try {
      const reply = await sendToAgent(text);
      hideTyping();
      addMessage("bot", reply);
    } catch (err) {
      hideTyping();
      addMessage("bot", "Désolé, une erreur est survenue. Veuillez réessayer ou nous appeler au " + AGENT_CONFIG.phone);
    }

    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    handleSend();
  }

  // ── Auto-resize textarea ──────────────────────────────
  inputEl.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });

  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // ── Message d'accueil ─────────────────────────────────
  addMessage("bot", `Bonjour et bienvenue chez ${AGENT_CONFIG.restaurantName} ! Je suis ${AGENT_CONFIG.agentName}, votre assistant. Comment puis-je vous aider ?`);
</script>

</body>
</html>
