<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <script src="agent.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --black-soft: #111111;
      --black-card: #161616;
      --gold: #C9A84C;
      --gold-light: #E2C97E;
      --gold-dim: rgba(201,168,76,0.15);
      --gold-border: rgba(201,168,76,0.25);
      --white: #F5F0E8;
      --white-muted: rgba(245,240,232,0.5);
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 50%);
    }

    .chat-wrapper {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      height: 92vh;
      max-height: 720px;
      background: var(--black-card);
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--gold-border);
      box-shadow: 0 0 60px rgba(201,168,76,0.08), 0 24px 80px rgba(0,0,0,0.6);
    }

    /* ── Header ── */
    .chat-header {
      background: var(--black);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--gold-border);
      position: relative;
      overflow: hidden;
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--gold-border);
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-name {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--white);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 11px;
      color: var(--gold);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Suggestions ── */
    .suggestions {
      padding: 12px 16px 0;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      padding: 5px 12px;
      border: 1px solid var(--gold-border);
      border-radius: 1px;
      font-size: 11px;
      font-family: var(--font-body);
      color: var(--gold);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .suggestion-chip:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 2px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gold-border); }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--gold-border);
      margin-bottom: 2px;
    }

    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .user .msg-avatar {
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .bubble {
      max-width: 76%;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.7;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .bot .bubble {
      background: var(--black-soft);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 1px 12px 12px 12px;
    }

    .user .bubble {
      background: var(--gold-dim);
      color: var(--white);
      border: 1px solid var(--gold-border);
      border-radius: 12px 1px 12px 12px;
    }

    /* ── Typing ── */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-bubble span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.4;
      animation: blink 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.3); }
    }

    /* ── Input ── */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--gold-border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--black);
      position: relative;
    }

    .input-area::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .input-field {
      flex: 1;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      color: var(--white);
      background: var(--black-soft);
      border: 1px solid var(--gold-border);
      border-radius: 1px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 100px;
      letter-spacing: 0.02em;
      transition: border-color 0.2s;
    }

    .input-field:focus { border-color: var(--gold); }
    .input-field::placeholder { color: rgba(245,240,232,0.25); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 1px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:hover { background: var(--gold-light); transform: scale(1.04); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: var(--black); }

    /* ── Footer ── */
    .powered-by {
      text-align: center;
      font-size: 10px;
      color: rgba(245,240,232,0.2);
      padding: 6px 0 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--black);
    }

    .powered-by span { color: var(--gold); opacity: 0.6; }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="msg-avatar header-logo-wrap" style="width:40px;height:40px;border-radius:50%;overflow:hidden;border:1px solid rgba(201,168,76,0.25);flex-shrink:0;">
      <img id="header-logo" src="" alt="logo" style="width:100%;height:100%;object-fit:cover;" />
    </div>
    <div class="header-info">
      <div class="header-name" id="header-name">Assistant</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <div class="status-text">Disponible maintenant</div>
      </div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion('Quels sont vos horaires ?')">Horaires</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Pouvez-vous me montrer le menu ?')">Menu</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Comment réserver une table ?')">Réserver</button>
    <button class="suggestion-chip" onclick="sendSuggestion('Comment vous accéder ?')">Accès</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" class="input-field" placeholder="Posez votre question..." rows="1"></textarea>
    <button id="send-btn" class="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered-by">Propulsé par <span>IA</span> · Assistant 24/7</div>
</div>

  document.getElementById("header-logo").src = LOGO_SRC;
  document.getElementById("header-name").textContent = AGENT_CONFIG.agentName + " · " + AGENT_CONFIG.restaurantName;
  document.title = "Assistant — " + AGENT_CONFIG.restaurantName;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = "message " + role;
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    if (role === "bot") {
      const img = document.createElement("img");
      img.src = LOGO_SRC;
      img.alt = "logo";
      avatar.appendChild(img);
    } else {
      avatar.textContent = "V";
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message bot";
    wrap.id = "typing";
    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    const img = document.createElement("img");
    img.src = LOGO_SRC;
    avatar.appendChild(img);
    const bubble = document.createElement("div");
    bubble.className = "bubble typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    inputEl.disabled = true;
    document.getElementById("suggestions").style.display = "none";
    addMessage("user", text);
    showTyping();
    try {
      const reply = await sendToAgent(text);
      hideTyping();
      addMessage("bot", reply);
    } catch (err) {
      hideTyping();
      addMessage("bot", "Désolé, une erreur est survenue. Veuillez réessayer ou nous appeler au " + AGENT_CONFIG.phone);
    }
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    handleSend();
  }

  inputEl.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });

  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  addMessage("bot", "Bonsoir et bienvenue chez " + AGENT_CONFIG.restaurantName + ". Je suis " + AGENT_CONFIG.agentName + ", votre assistant. Comment puis-je vous être utile ?");
</script>
