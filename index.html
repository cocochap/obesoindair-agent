<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  
  
  <script src="agent.js"></script>
  <script src="welcome.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --cream-dark: #F2EDE4; --cream-border: #E8E0D0;
      --brown: #8B6F47; --brown-light: #A68B5B;
      --text: #2C2416; --text-muted: #9A8B76; --white: #FFFFFF;
      --font-display: 'Lora', serif; --font-body: 'Inter', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--cream-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;  background-size: cover; background-position: center; }
    .chat-wrapper { width: 100%; max-width: 440px; display: flex; flex-direction: column; height: 90vh; max-height: 700px; background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 40px rgba(44,36,22,0.08); }
    .chat-header { padding: 14px 20px; background: var(--white); border-bottom: 1px solid var(--cream-border); display: flex; align-items: center; gap: 12px; }
    .header-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--cream-dark); border: 1.5px solid var(--cream-border); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 15px; color: var(--brown); flex-shrink: 0; }
    .header-info { flex: 1; }
    .header-name { font-family: var(--font-display); font-size: 15px; color: var(--text); font-weight: 500; }
    .header-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 3px; }
    .header-status { display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #7CB87C; }
    .status-text { font-size: 11px; color: var(--text-muted); font-weight: 300; }
    .lang-switcher { display: flex; align-items: center; gap: 4px; }
    .lang-btn { background: none; border: none; cursor: pointer; font-size: 11px; font-family: var(--font-body); padding: 2px 4px; border-radius: 4px; transition: all 0.15s; }
    .lang-btn.active { color: var(--brown); font-weight: 500; }
    .lang-btn.inactive { color: var(--text-muted); font-weight: 300; }
    .lang-sep { color: var(--cream-border); font-size: 10px; }
    .suggestions { padding: 10px 16px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--cream-border); background: var(--cream); }
    .suggestion-chip { padding: 6px 12px; border: 1px solid var(--cream-border); border-radius: 20px; font-size: 12px; font-family: var(--font-body); color: var(--brown); background: var(--white); cursor: pointer; transition: all 0.15s; }
    .suggestion-chip:hover { background: var(--cream-dark); border-color: var(--brown-light); }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: var(--cream); }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--cream-border); border-radius: 3px; }
    .message { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .msg-avatar { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; margin-bottom: 2px; }
    .bot .msg-avatar { background: var(--cream-dark); border: 1px solid var(--cream-border); color: var(--brown); font-family: var(--font-display); }
    .user .msg-avatar { background: var(--brown); color: var(--white); }
    .bubble { max-width: 78%; padding: 11px 15px; font-size: 13.5px; line-height: 1.65; font-weight: 300; }
    .bot .bubble { background: var(--white); color: var(--text); border-radius: 4px 16px 16px 16px; border: 1px solid var(--cream-border); }
    .user .bubble { background: var(--brown); color: var(--white); border-radius: 16px 4px 16px 16px; }
    .typing-bubble { display: flex; gap: 4px; padding: 13px 16px; align-items: center; }
    .typing-bubble span { width: 5px; height: 5px; border-radius: 50%; background: var(--cream-border); animation: blink 1.2s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
    .input-area { padding: 12px 14px; border-top: 1px solid var(--cream-border); display: flex; gap: 8px; align-items: flex-end; background: var(--white); }
    .input-field { flex: 1; font-family: var(--font-body); font-size: 13.5px; font-weight: 300; color: var(--text); background: var(--cream); border: 1px solid var(--cream-border); border-radius: 22px; padding: 9px 16px; resize: none; outline: none; line-height: 1.5; max-height: 100px; transition: border-color 0.15s; }
    .input-field:focus { border-color: var(--brown-light); }
    .input-field::placeholder { color: var(--text-muted); }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--brown); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .send-btn:hover { background: var(--brown-light); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 15px; height: 15px; fill: white; }
    .powered-by { text-align: center; font-size: 10px; color: var(--text-muted); padding: 5px 0 8px; background: var(--white); letter-spacing: 0.04em; }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-avatar" id="header-avatar">A</div>
    <div class="header-info">
      <div class="header-name" id="header-name">Assistant</div>
      <div class="header-bottom">
        <div class="header-status">
          <div class="status-dot"></div>
          <div class="status-text" id="status-text">Disponible maintenant</div>
        </div>
        <div class="lang-switcher">
          <button class="lang-btn active" id="lang-fr" onclick="switchLang('fr')">FR</button>
          <span class="lang-sep">|</span>
          <button class="lang-btn inactive" id="lang-en" onclick="switchLang('en')">EN</button>
        </div>
      </div>
    </div>
  </div>
  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" id="chip-0" onclick="sendSuggestion('Quels sont vos horaires ?')">🕐 Horaires</button>
    <button class="suggestion-chip" id="chip-1" onclick="sendSuggestion('Pouvez-vous me montrer le menu ?')">🍽 Menu</button>
    <button class="suggestion-chip" id="chip-2" onclick="sendSuggestion('Comment réserver une table ?')">📅 Réserver</button>
    <button class="suggestion-chip" id="chip-3" onclick="sendSuggestion('Comment vous accéder ?')">📍 Accès</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" class="input-field" placeholder="Écrivez votre message..." rows="1"></textarea>
    <button id="send-btn" class="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered-by">Assistant IA · Disponible 24h/24</div>
</div>
<script>
  document.getElementById("header-avatar").textContent = AGENT_CONFIG.agentName.charAt(0);
  document.getElementById("header-name").textContent = AGENT_CONFIG.agentName + " · " + AGENT_CONFIG.restaurantName;
  document.title = "Assistant — " + AGENT_CONFIG.restaurantName;

  const langs = {
    fr: {
      placeholder: 'Écrivez votre message...', status: 'Disponible maintenant',
      welcome: () => `Bonjour et bienvenue chez ${AGENT_CONFIG.restaurantName} ! Je suis ${AGENT_CONFIG.agentName}, votre assistant. Comment puis-je vous aider ?`,
      chips: ['🕐 Horaires', '🍽 Menu', '📅 Réserver', '📍 Accès'],
      questions: ['Quels sont vos horaires ?', 'Pouvez-vous me montrer le menu ?', 'Comment réserver une table ?', 'Comment vous accéder ?'],
    },
    en: {
      placeholder: 'Write your message...', status: 'Available now',
      welcome: () => `Hello and welcome to ${AGENT_CONFIG.restaurantName}! I'm ${AGENT_CONFIG.agentName}, your assistant. How can I help you?`,
      chips: ['🕐 Hours', '🍽 Menu', '📅 Book', '📍 Access'],
      questions: ['What are your opening hours?', 'Can you show me the menu?', 'How can I book a table?', 'How do I get there?'],
    }
  };

  let currentLang = 'fr';

  function switchLang(lang) {
    currentLang = lang;
    const t = langs[lang];
    document.getElementById('input').placeholder = t.placeholder;
    document.getElementById('status-text').textContent = t.status;
    document.getElementById('lang-fr').className = 'lang-btn ' + (lang === 'fr' ? 'active' : 'inactive');
    document.getElementById('lang-en').className = 'lang-btn ' + (lang === 'en' ? 'active' : 'inactive');
    for (let i = 0; i < 4; i++) {
      const chip = document.getElementById('chip-' + i);
      chip.textContent = t.chips[i];
      chip.onclick = () => sendSuggestion(t.questions[i]);
    }
  }

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  function addMessage(role, text) {
    const wrap = document.createElement("div"); wrap.className = "message " + role;
    const avatar = document.createElement("div"); avatar.className = "msg-avatar";
    avatar.textContent = role === "bot" ? AGENT_CONFIG.agentName.charAt(0) : "V";
    const bubble = document.createElement("div"); bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(avatar); wrap.appendChild(bubble);
    messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div"); wrap.className = "message bot"; wrap.id = "typing";
    const avatar = document.createElement("div"); avatar.className = "msg-avatar";
    avatar.textContent = AGENT_CONFIG.agentName.charAt(0);
    const bubble = document.createElement("div"); bubble.className = "bubble typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(avatar); wrap.appendChild(bubble);
    messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

  async function handleSend() {
    const text = inputEl.value.trim(); if (!text) return;
    inputEl.value = ""; inputEl.style.height = "auto";
    sendBtn.disabled = true; inputEl.disabled = true;
    document.getElementById("suggestions").style.display = "none";
    addMessage("user", text); showTyping();
    try {
      const reply = await sendToAgent(text, currentLang); hideTyping(); addMessage("bot", reply);
    } catch (err) {
      hideTyping(); addMessage("bot", currentLang === 'fr' ? "Désolé, une erreur est survenue. Veuillez nous appeler au " + AGENT_CONFIG.phone : "Sorry, an error occurred. Please call us at " + AGENT_CONFIG.phone);
    }
    sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus();
  }

  function sendSuggestion(text) { inputEl.value = text; handleSend(); }

  inputEl.addEventListener("input", function () { this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 100) + "px"; });
  inputEl.addEventListener("keydown", function (e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });

  addMessage("bot", langs.fr.welcome());
</script>
</body>
</html>
